services:
  rio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rio
    ports:
      - "81:81"       # Caddy reverse proxy (the "official" entrypoint)
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-dev-only-change-me-in-prod-32chars-min!!}
      - DATABASE_URL=file:/app/db/custom.db
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-http://localhost:3000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_REALNAME=${ADMIN_REALNAME:-}
      - ADMIN_NICKNAME=${ADMIN_NICKNAME:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-}
      - NEXT_PUBLIC_DISCORD_INVITE_URL=${NEXT_PUBLIC_DISCORD_INVITE_URL:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-}
    volumes:
      # Persistent DB so data survives image rebuilds.
      - rio-db:/app/db
    restart: unless-stopped

  # ── Optional: standalone uptime monitor ──────────────────────────────────────
  # Polls /api/health every 60s from outside the app process.
  # Sends Discord alerts on downtime / recovery.
  # To enable: uncomment the block below, then set DISCORD_WEBHOOK_URL.
  #
  # uptime-monitor:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: rio-uptime
  #   command: ["bun", "run", "scripts/uptime-monitor.ts"]
  #   environment:
  #     - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
  #     - HEALTH_CHECK_URL=http://rio:3000/api/health
  #     - POLL_INTERVAL_MS=60000
  #   depends_on:
  #     - rio
  #   restart: unless-stopped

volumes:
  rio-db:
